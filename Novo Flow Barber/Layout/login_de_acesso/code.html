<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login de Acesso - Barbearia App</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Ambient Background Effect -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute -top-32 -left-32 w-96 h-96 bg-primary/10 rounded-full blur-[100px] opacity-40"></div>
<div class="absolute top-1/3 right-0 w-64 h-64 bg-primary/5 rounded-full blur-[80px] opacity-20"></div>
</div>
<!-- Main Container -->
<div class="w-full max-w-[430px] flex flex-col h-full min-h-screen px-6 py-8 relative z-10 justify-between">
<!-- Header Section -->
<div class="flex flex-col items-center justify-center flex-grow pt-8 pb-4">
<!-- Logo Placeholder with Gold Accent Idea -->
<div class="w-24 h-24 mb-6 rounded-2xl bg-gradient-to-br from-slate-800 to-black border border-white/10 shadow-2xl flex items-center justify-center relative overflow-hidden group">
<!-- Abstract Gold/Primary sheen -->
<div class="absolute inset-0 bg-gradient-to-tr from-yellow-500/20 via-transparent to-primary/20 opacity-50 group-hover:opacity-75 transition-opacity duration-500"></div>
<div class="bg-[url('https://placeholder.pics/svg/300')] bg-center bg-cover w-full h-full opacity-80 mix-blend-overlay" data-alt="Golden metallic abstract barbershop logo"></div>
<span class="material-symbols-outlined text-4xl text-primary drop-shadow-[0_0_10px_rgba(19,200,236,0.5)] z-10">content_cut</span>
</div>
<h1 class="text-slate-900 dark:text-white text-3xl font-bold tracking-tight text-center mb-2">Bem-vindo</h1>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm font-medium leading-relaxed max-w-[280px]">
                Gerencie sua barbearia com excelência e estilo.
            </p>
</div>
<!-- Form Section -->
<div class="w-full space-y-5 mb-8">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold pl-1">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="form-input block w-full pl-11 pr-4 py-4 rounded-xl border-0 bg-white dark:bg-[#192f33] ring-1 ring-inset ring-slate-200 dark:ring-slate-700 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:bg-white dark:focus:bg-[#1f3a3f] text-slate-900 dark:text-white sm:text-sm sm:leading-6 transition-all duration-200 shadow-sm" placeholder="seu@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold">Senha</label>
<a class="text-xs font-medium text-primary hover:text-primary/80 transition-colors" href="#">Esqueci minha senha</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="form-input block w-full pl-11 pr-12 py-4 rounded-xl border-0 bg-white dark:bg-[#192f33] ring-1 ring-inset ring-slate-200 dark:ring-slate-700 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:bg-white dark:focus:bg-[#1f3a3f] text-slate-900 dark:text-white sm:text-sm sm:leading-6 transition-all duration-200 shadow-sm" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 cursor-pointer text-slate-400 hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</div>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-[#11b4d5] text-background-dark font-bold text-base py-4 px-6 rounded-xl shadow-[0_0_20px_rgba(19,200,236,0.3)] hover:shadow-[0_0_25px_rgba(19,200,236,0.5)] transition-all duration-300 transform active:scale-[0.98] mt-6 flex items-center justify-center gap-2">
                Entrar
                <span class="material-symbols-outlined text-[20px] font-bold">arrow_forward</span>
</button>
<!-- Biometric Option (iOS Style) -->
<div class="flex justify-center pt-4">
<button aria-label="Entrar com FaceID" class="p-3 rounded-full hover:bg-white/5 transition-colors text-primary">
<span class="material-symbols-outlined text-4xl font-light">face_unlock</span>
</button>
</div>
</div>
<!-- Footer Section -->
<div class="text-center pt-4 pb-4">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Ainda não tem conta? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 transition-all ml-1" href="#">Cadastrar-se</a>
</p>
</div>
</div>
</body></html>
